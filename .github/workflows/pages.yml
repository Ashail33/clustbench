name: Build and deploy Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow at most one Pages deployment to run at a time, but never cancel a
# deployment in progress (cancelling can leave the site in a half-deployed
# state).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install clustbench
        run: pip install -e .

      - name: Run benchmark
        run: clustbench --config configs/benchmark.paper.demo.yaml --out runs/dashboard

      - name: Build dashboard JSON
        run: python scripts/build_site.py --run runs/dashboard --out docs/data

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
