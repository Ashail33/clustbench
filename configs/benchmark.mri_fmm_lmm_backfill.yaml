# Backfill of MRI / FMM / LMM on the same factorial task grid as
# benchmark.all_algos.factorial.yaml and its .expanded sibling, so the
# new algorithms appear on the dashboard alongside the recorded data.
#
# Grid coverage: union of the original factorial (96 tasks) and the
# expanded factorial (8 tasks), matching the 104-task dashboard layout.

datasets:
  # Original factorial: 2^6 = 64 dataset cells, n in {500,1000}, d in {2,10}, k in {3,5}.
  - id: mdcgen
    n_samples: [500, 1000]
    n_features: [2, 10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [0.01, 1.0]
  # Expanded factorial: larger n / d / k.
  - id: mdcgen
    n_samples: [1500, 2000]
    n_features: [25, 50]
    k_targets: [7, 10]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [1.0]

algorithms:
  - name: mri
    kind: python
    entry: mri
    params: {n_neighbors: 15, n_echoes: 6, n_gradient_axes: 3}
  - name: fmm
    kind: python
    entry: fmm
    params: {n_frequencies: 64, n_scales: 3, max_iter: 40}
  - name: lmm
    kind: python
    entry: lmm
    params: {}     # all "auto" defaults: n_eigvecs=k, n_neighbors=auto, no Nystrom

seeds: [1]
