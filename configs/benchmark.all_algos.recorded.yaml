# All registered algorithms on the same larger MDCGen task.
#
# The output run directory records each algorithm separately:
# - artifacts/labels_<algo>__*.npy
# - artifacts/metrics_<algo>__*.json
# - artifacts/trajectory_<algo>__*.parquet where available
# - by_algo/<algo>/results.csv generated by scripts/export_by_algo.py

datasets:
  - id: mdcgen
    n_samples: [2000]
    n_features: [10]
    k_targets: [5]
    compactness: [1.0]
    outliers: [500]
    noise: [10]
    density: [1.0]

algorithms:
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params: {max_iter: 100, n_init: 3, n_workers: 1}
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params: {batch_size: 500, max_iter: 100}
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
      base_params:
        kmeans: {record_trajectory: false, max_iter: 100, n_init: 3}
        minibatch_kmeans: {batch_size: 500, max_iter: 100}
        birch_algo: {threshold: 1.0}
  - name: s5c
    kind: python
    entry: s5c
    params: {sample_size: 1000, n_nonzero_coefs: 5}
  - name: kmeans
    kind: python
    entry: kmeans
    params: {max_iter: 100, n_init: 3}
  - name: dbscan
    kind: python
    entry: dbscan
    params: {eps: 0.8, min_samples: 5}
  - name: birch_algo
    kind: python
    entry: birch_algo
    params: {threshold: 1.0}
  - name: clarans
    kind: python
    entry: clarans
    params: {numlocal: 2, maxneigh: 30}
  - name: consensus
    kind: python
    entry: consensus
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
      base_params:
        kmeans: {record_trajectory: false, max_iter: 100, n_init: 3}
        minibatch_kmeans: {batch_size: 500, max_iter: 100}
        birch_algo: {threshold: 1.0}
  - name: gmm
    kind: python
    entry: gmm
    params: {max_iter: 100, n_init: 1}
  - name: agglomerative
    kind: python
    entry: agglomerative
    params: {linkage: ward}
  - name: spectral
    kind: python
    entry: spectral
    params: {n_neighbors: 10}
  - name: meanshift
    kind: python
    entry: meanshift
    params: {bin_seeding: true}
  - name: optics
    kind: python
    entry: optics
    params: {min_samples: 5, xi: 0.05}

seeds: [1]
