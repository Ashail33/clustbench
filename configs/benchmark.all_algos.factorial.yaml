# Full-factorial screening design crossed with every registered algorithm.
#
# Factors:
# - n_samples: low/high
# - n_features: low/high
# - k_targets: low/high
# - outliers: absent/present
# - noise: low/high
# - density: sparse/dense
#
# 2^6 dataset cells x 1 seed x 14 algorithms = 896 result rows.
# This is deliberately smaller than benchmark.paper.yaml's full scale so
# algorithms such as OPTICS, spectral, agglomerative, and mean-shift can
# still finish locally while every experimental variable is represented.

datasets:
  - id: mdcgen
    n_samples: [500, 1000]
    n_features: [2, 10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [0.01, 1.0]

algorithms:
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params: {max_iter: 100, n_init: 3, n_workers: 1}
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params: {batch_size: 500, max_iter: 100}
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
      base_params:
        kmeans: {record_trajectory: false, max_iter: 100, n_init: 3}
        minibatch_kmeans: {batch_size: 500, max_iter: 100}
        birch_algo: {threshold: 1.0}
  - name: s5c
    kind: python
    entry: s5c
    params: {sample_size: 1000, n_nonzero_coefs: 5}
  - name: kmeans
    kind: python
    entry: kmeans
    params: {max_iter: 100, n_init: 3}
  - name: dbscan
    kind: python
    entry: dbscan
    params: {eps: 0.8, min_samples: 5}
  - name: birch_algo
    kind: python
    entry: birch_algo
    params: {threshold: 1.0}
  - name: clarans
    kind: python
    entry: clarans
    params: {numlocal: 2, maxneigh: 30}
  - name: consensus
    kind: python
    entry: consensus
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
      base_params:
        kmeans: {record_trajectory: false, max_iter: 100, n_init: 3}
        minibatch_kmeans: {batch_size: 500, max_iter: 100}
        birch_algo: {threshold: 1.0}
  - name: gmm
    kind: python
    entry: gmm
    params: {max_iter: 100, n_init: 1}
  - name: agglomerative
    kind: python
    entry: agglomerative
    params: {linkage: ward}
  - name: spectral
    kind: python
    entry: spectral
    params: {n_neighbors: 10}
  - name: meanshift
    kind: python
    entry: meanshift
    params: {bin_seeding: true}
  - name: optics
    kind: python
    entry: optics
    params: {min_samples: 5, xi: 0.05}

seeds: [1]
