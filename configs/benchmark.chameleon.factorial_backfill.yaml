# Backfill CHAMELEON-style clustering over the existing dashboard task cells.
#
# This gives the new algorithm one row for every task already present in
# all_algos_factorial_plus_expanded, so dynamic rank tests can include the
# new algorithm on complete comparable cells.

datasets:
  - id: mdcgen
    n_samples: [500, 1000]
    n_features: [2, 10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [0.01, 1.0]
  - id: mdcgen
    n_samples: [1500, 2000]
    n_features: [25, 50]
    k_targets: [7, 10]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [1.0]

algorithms:
  - name: chameleon
    kind: python
    entry: chameleon
    params: {n_neighbors: 15, overcluster_factor: 8, max_partitions: 120}

seeds: [1]
