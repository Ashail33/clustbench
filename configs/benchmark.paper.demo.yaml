# Canonical config the GitHub Pages workflow runs on every push.
#
# Includes all 17 registered algorithms — the four paper-taxonomy ones,
# every classic baseline and sklearn extra, plus the three research
# algorithms added in PR #4 (mri, fmm, lmm) — and the same dataset
# properties Maharaj (2024) varied (outliers, noise, density), plus
# moons / circles / anisotropic for non-convex coverage. Sized for a CI
# run of ~10 minutes on an ubuntu-latest GitHub-hosted runner.
#
# For bigger sweeps, use configs/benchmark.paper.yaml (the full grid)
# locally and push the regenerated docs/data/.

datasets:
  - id: mdcgen
    n_samples: [500]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 100]
    noise: [0]
    density: [1.0]
  - id: anisotropic
    n_samples: [500]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]
  - id: moons
    n_samples: [500]
    n_features: [2]
    k_targets: [2]
    compactness: [1.0]
  - id: circles
    n_samples: [500]
    n_features: [2]
    k_targets: [2]
    compactness: [1.0]

algorithms:
  # Paper-taxonomy quartet (one per category)
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params: {max_iter: 50, n_init: 2, n_workers: 1}
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params: {batch_size: 100, max_iter: 100}
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
  - name: s5c
    kind: python
    entry: s5c
    params: {sample_size: 200, n_nonzero_coefs: 5}

  # Classic baselines
  - name: kmeans
    kind: python
    entry: kmeans
    params: {max_iter: 100, n_init: 3}
  - name: dbscan
    kind: python
    entry: dbscan
    params: {eps: 0.8, min_samples: 5}
  - name: birch_algo
    kind: python
    entry: birch_algo
    params: {threshold: 1.0}
  - name: clarans
    kind: python
    entry: clarans
    params: {numlocal: 2, maxneigh: 30}
  - name: consensus
    kind: python
    entry: consensus
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]

  # sklearn extras
  - name: gmm
    kind: python
    entry: gmm
    params: {max_iter: 100, n_init: 1}
  - name: agglomerative
    kind: python
    entry: agglomerative
    params: {linkage: ward}
  - name: spectral
    kind: python
    entry: spectral
    params: {n_neighbors: 10}
  - name: meanshift
    kind: python
    entry: meanshift
    params: {bin_seeding: true}
  - name: optics
    kind: python
    entry: optics
    params: {min_samples: 5, xi: 0.05}

  # Research algorithms added in PR #4
  - name: mri
    kind: python
    entry: mri
    params: {n_neighbors: 15, n_echoes: 6, n_gradient_axes: 3}
  - name: fmm
    kind: python
    entry: fmm
    params: {n_frequencies: 64, n_scales: 3, max_iter: 40}
  - name: lmm
    kind: python
    entry: lmm
    params: {}

  # Improved variants (see docs/ALGORITHM_ANALYSIS.md "Overcoming the bottlenecks")
  - name: kmeans_trimmed
    kind: python
    entry: kmeans_trimmed
    params: {trim: 0.10, n_init: 3, max_iter: 100}
  - name: clarans_pp
    kind: python
    entry: clarans_pp
    params: {numlocal: 2, maxneigh: 80}
  - name: dbscan_auto
    kind: python
    entry: dbscan_auto
    params: {min_samples: 5}
  - name: meanshift_robust
    kind: python
    entry: meanshift_robust
    params: {trim: 0.2, quantile: 0.2}
  - name: pwcc_diverse
    kind: python
    entry: pwcc_diverse
    params:
      base: [kmeans, spectral, gmm]

  # Synthesized algorithms built from analysis of which mechanisms won
  # on which dimension (see docs/ALGORITHM_ANALYSIS.md).
  - name: aura
    kind: python
    entry: aura
    params: {}
  - name: meta_clusterer
    kind: python
    entry: meta_clusterer
    params: {}
  - name: rapid
    kind: python
    entry: rapid
    params: {}

  # v2 iterations — fix the specific failure modes observed on v1
  - name: aura_v2
    kind: python
    entry: aura_v2
    params: {}
  - name: meta_clusterer_v2
    kind: python
    entry: meta_clusterer_v2
    params: {}
  - name: rapid_v2
    kind: python
    entry: rapid_v2
    params: {}

seeds: [1, 2]
