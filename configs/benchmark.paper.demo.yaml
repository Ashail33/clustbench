# Downsampled paper-style sweep that backs the live dashboard.
# Same shape as benchmark.paper.yaml (the full Maharaj 2024 grid) but
# tuned to complete in a few minutes locally / in CI. Mixes the four
# paper algorithms (one per taxonomy category) with five additional
# sklearn algorithms so the comparison surface is wider than the paper's.

datasets:
  - id: mdcgen
    n_samples: [1000, 5000]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 100]
    noise: [0, 50]
    density: [0.5, 1.0]
  - id: anisotropic
    n_samples: [1000]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]

algorithms:
  # Paper-taxonomy quartet
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params: {max_iter: 50, n_init: 2, n_workers: 1}
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params: {batch_size: 200, max_iter: 100}
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
  - name: s5c
    kind: python
    entry: s5c
    params: {sample_size: 300, n_nonzero_coefs: 5}
  # Extras
  - name: gmm
    kind: python
    entry: gmm
    params: {max_iter: 100, n_init: 1}
  - name: agglomerative
    kind: python
    entry: agglomerative
    params: {linkage: ward}
  - name: spectral
    kind: python
    entry: spectral
    params: {n_neighbors: 10}
  - name: meanshift
    kind: python
    entry: meanshift
    params: {bin_seeding: true}
  - name: birch_algo
    kind: python
    entry: birch_algo
    params: {threshold: 1.0}

seeds: [1, 2]
