# Canonical config the GitHub Pages workflow runs on every push.
#
# Includes all 14 registered algorithms — the four paper-taxonomy ones
# plus every classic baseline and sklearn extra — and the same dataset
# properties Maharaj (2024) varied (outliers, noise, density). Sized for
# a CI run of ~6-8 minutes on an ubuntu-latest GitHub-hosted runner.
#
# For bigger sweeps, use configs/benchmark.paper.yaml (the full grid)
# locally and push the regenerated docs/data/.

datasets:
  - id: mdcgen
    n_samples: [500]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 100]
    noise: [0]
    density: [1.0]
  - id: anisotropic
    n_samples: [500]
    n_features: [10]
    k_targets: [3, 5]
    compactness: [1.0]

algorithms:
  # Paper-taxonomy quartet (one per category)
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params: {max_iter: 50, n_init: 2, n_workers: 1}
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params: {batch_size: 100, max_iter: 100}
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
  - name: s5c
    kind: python
    entry: s5c
    params: {sample_size: 200, n_nonzero_coefs: 5}

  # Classic baselines
  - name: kmeans
    kind: python
    entry: kmeans
    params: {max_iter: 100, n_init: 3}
  - name: dbscan
    kind: python
    entry: dbscan
    params: {eps: 0.8, min_samples: 5}
  - name: birch_algo
    kind: python
    entry: birch_algo
    params: {threshold: 1.0}
  - name: clarans
    kind: python
    entry: clarans
    params: {numlocal: 2, maxneigh: 30}
  - name: consensus
    kind: python
    entry: consensus
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]

  # sklearn extras
  - name: gmm
    kind: python
    entry: gmm
    params: {max_iter: 100, n_init: 1}
  - name: agglomerative
    kind: python
    entry: agglomerative
    params: {linkage: ward}
  - name: spectral
    kind: python
    entry: spectral
    params: {n_neighbors: 10}
  - name: meanshift
    kind: python
    entry: meanshift
    params: {bin_seeding: true}
  - name: optics
    kind: python
    entry: optics
    params: {min_samples: 5, xi: 0.05}

seeds: [1, 2]
