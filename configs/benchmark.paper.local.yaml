# Local paper-shaped sweep.
#
# This keeps the four taxonomy algorithms from benchmark.paper.yaml but
# expands beyond the dashboard demo while avoiding the full 3,240-run grid.
# Scale this toward the full paper config by adding sizes, features, seeds,
# and the remaining noise/density levels from benchmark.paper.yaml.

datasets:
  - id: mdcgen
    n_samples: [1000, 5000]
    n_features: [2, 10]
    k_targets: [3, 5]
    compactness: [1.0]
    outliers: [0, 500]
    noise: [0, 10]
    density: [0.01, 1.0]

algorithms:
  - name: parallel_kmeans
    kind: python
    entry: parallel_kmeans
    params:
      max_iter: 100
      n_init: 3
      n_workers: 1
  - name: minibatch_kmeans
    kind: python
    entry: minibatch_kmeans
    params:
      batch_size: 500
      max_iter: 100
  - name: pwcc
    kind: python
    entry: pwcc
    params:
      base: [kmeans, minibatch_kmeans, birch_algo]
  - name: s5c
    kind: python
    entry: s5c
    params:
      sample_size: 1000
      n_nonzero_coefs: 5

seeds: [1]
